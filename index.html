<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <title>تالين أشقر</title>

  <style>
    :root {
      --bg: #0c0911;
      --bg-soft: #15101c;
      --text: #f5eef8;
      --muted: #b7a8c3;
      --line: rgba(214, 123, 184, 0.25);
      --card: #17111f;
      --card-hover: #201629;
      --accent: #b06ab3;
      --accent-soft: #d67bb8;
      --shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Amiri', serif;
      background:
        radial-gradient(circle at top, rgba(214, 123, 184, 0.08), transparent 30%),
        linear-gradient(to bottom, #0c0911, #09070d);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      text-align: center;
      padding: 50px 20px 30px;
    }

    .top-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-soft);
      margin-bottom: 18px;
    }

    .divider {
      width: min(1100px, calc(100% - 40px));
      height: 1px;
      margin: 0 auto;
      background: linear-gradient(to left, transparent, var(--accent-soft), transparent);
      opacity: 0.8;
    }

    .avatar-wrap {
      width: 220px;
      height: 220px;
      margin: 28px auto 22px;
      border-radius: 50%;
      border: 2px solid var(--accent-soft);
      background: var(--bg-soft);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 8px rgba(214, 123, 184, 0.05),
        0 0 40px rgba(214, 123, 184, 0.3);
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 65% 25%;
      border-radius: 50%;
      display: block;
    }

    .identity h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 4rem);
      font-weight: 700;
      line-height: 1.3;
    }

    .identity p {
      margin-top: 14px;
      font-size: 1.15rem;
      color: var(--muted);
      line-height: 1.9;
    }

    .links {
      width: min(520px, calc(100% - 32px));
      margin: 48px auto 70px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 18px;
      border-radius: 999px;
      text-align: center;
      text-decoration: none;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      background: rgba(23, 17, 31, 0.92);
      border: 1px solid rgba(214, 123, 184, 0.18);
      box-shadow: var(--shadow);
      transition: 0.25s;
    }

    .link-btn:hover {
      transform: translateY(-3px);
      background: var(--card-hover);
      border-color: var(--accent-soft);
      color: #ffd6ef;
    }

    footer {
      margin-top: auto;
      border-top: 1px solid rgba(214, 123, 184, 0.14);
      padding: 28px 20px 36px;
      text-align: center;
      color: var(--muted);
    }

    footer .handle {
      display: block;
      margin-bottom: 8px;
      color: var(--accent-soft);
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .avatar-wrap {
        width: 170px;
        height: 170px;
      }

      .identity h1 {
        font-size: 2.2rem;
      }

      .link-btn {
        font-size: 1.1rem;
      }
    }

.avatar-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 65% 25%;
  border-radius: 50%;
  display: block;
}
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="top-name">Social Links</div>
      <div class="divider"></div>

      <div class="avatar-wrap">
  <img src="./images/ProfilePic.jpeg" alt="images">
</div>

      <div class="identity">
        <h1>تالين أشقر | Taleen Ashgar</h1>
        <p>Data Scientist | Data Analyst | Data visualisation | Data Engineering | UI/UX Designer</p>
      </div>
    </section>

    <section class="links">
      <a class="link-btn" href="https://x.com/toutashgar?s=21&t=pnM9zbc7ZalM3kAN1-fwbA" target="_blank">X</a>
      <a class="link-btn" href="https://www.linkedin.com/in/taleen-ashgar-186150323?utm_source=share_via&utm_content=profile&utm_medium=member_ios" target="_blank">LinkedIn</a>
      <a class="link-btn" href="https://whatsapp.com/dl/" target="_blank">WhatsApp</a>
      <a class="link-btn" href="https://ehsan.sa/donationcampaign/details/1905956">إحسان</a>
    </section>

    <footer>
      <span class="handle">@ Taleen Ashgar | تالين أشقر</span>
      جميع الحقوق محفوظة لدى @toutashgar
    </footer>
  </div>
</body>
</html>
